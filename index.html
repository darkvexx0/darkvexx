<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Dark Vexx</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="style.css"/>
</head>
<body>

<!-- Auth Overlay (zorunlu giriş ekranı) -->
<div id="auth-overlay">
  <div id="auth-box"></div>
</div>

<!-- Navbar -->
<nav id="navbar">
  <div class="nav-logo" onclick="goTo('home')">DARK<span>VEXX</span></div>
  <div class="nav-right">
    <button class="nb" onclick="goTo('home')">Ana Sayfa</button>
    <button class="nb" onclick="goTo('channels')">Kanallar</button>
    <div id="nav-user-area"></div>
  </div>
</nav>

<!-- Back Button -->
<button id="back-btn" onclick="goBack()">← Geri</button>

<!-- ── HOME ── -->
<section class="pg active" id="pg-home">
  <div class="hero-wrap">
    <div class="grid-bg"></div>
    <div class="hero-inner">
      <div class="hero-badge">YouTube Kanal Platformu</div>
      <h1 class="hero-title"><span id="glitch-text" data-text="DARK VEXX">DARK VEXX</span></h1>
      <p class="hero-desc">Kanalını paylaş, topluluğu keşfet.</p>
      <div class="hero-actions">
        <button class="btn-neon" onclick="goTo('add')">➕ Kanalını Ekle</button>
        <button class="btn-outline" onclick="goTo('channels')">🔍 Kanalları Keşfet</button>
      </div>
    </div>
    <div id="ptcl-wrap"></div>
  </div>
</section>

<!-- ── ADD CHANNEL ── -->
<section class="pg" id="pg-add">
  <div class="page-wrap">
    <h2 class="pg-title">Kanalını Ekle</h2>
    <div class="form-card">
      <div class="field">
        <label>YouTube Kanal Linki</label>
        <input id="inp-url" type="text" placeholder="https://youtube.com/@kanalin" autocomplete="off"/>
      </div>
      <div class="field">
        <label>Kategoriler <small>(en fazla 3)</small></label>
        <div id="cat-grid"></div>
      </div>
      <div class="msg-box err" id="add-err" style="display:none"></div>
      <button class="btn-neon w100" id="add-btn" onclick="addChannel()">🚀 Kanalı Ekle</button>
    </div>
  </div>
</section>

<!-- ── CHANNELS ── -->
<section class="pg" id="pg-channels">
  <div class="page-wrap">
    <h2 class="pg-title">Kanalları Keşfet</h2>
    <div id="filter-bar"></div>
    <div id="ch-grid"></div>
  </div>
</section>

<!-- ── ADMIN ── -->
<section class="pg" id="pg-admin">
  <div class="page-wrap">
    <h2 class="pg-title">⚙️ Admin Paneli</h2>
    <div id="admin-stats" class="stat-row"></div>
    <h3 class="sec-title">Kanallar</h3>
    <div id="admin-ch-list"></div>
    <h3 class="sec-title">Yasaklı Kullanıcılar</h3>
    <div id="admin-ban-list"></div>
  </div>
</section>

<!-- ── MODAL ── -->
<div id="modal-bg" onclick="closeModal()">
  <div id="modal-box" onclick="event.stopPropagation()">
    <button class="modal-x" onclick="closeModal()">✕</button>
    <div id="modal-body"></div>
  </div>
</div>

<!-- ── CHAT ── -->
<div id="chat-wrap">
  <div id="chat-head" onclick="toggleChat()">
    <span>💬 Sohbet</span>
    <span id="chat-arrow">▲</span>
  </div>
  <div id="chat-body">
    <div id="chat-auth-wall">
      <p>Sohbete katılmak için giriş yap veya kayıt ol.</p>
      <div class="chat-auth-row">
        <button class="btn-neon sm" onclick="openModal('login')">Giriş Yap</button>
        <button class="btn-outline sm" onclick="openModal('register')">Kayıt Ol</button>
      </div>
    </div>
    <div id="chat-inner" style="display:none;flex-direction:column;flex:1;overflow:hidden;">
      <div id="chat-userbar">
        <span id="chat-uname"></span>
        <button class="chat-exit-btn" onclick="chatLogout()">Çıkış</button>
      </div>
      <div id="chat-msgs"></div>
      <div id="chat-inputs">
        <div class="chat-row">
          <input id="chat-inp" type="text" placeholder="Mesaj yaz..." maxlength="200" onkeydown="if(event.key==='Enter')sendMsg()"/>
          <button id="chat-send" onclick="sendMsg()">➤</button>
        </div>
        <div id="chat-status"></div>
      </div>
    </div>
  </div>
</div>

<script src="app.js"></script>

<!-- Custom Cursor - en son ekleniyor, her şeyin üstünde -->
<div id="cur-dot"></div>
<div id="cur-ring"></div>
</body>
</html>
